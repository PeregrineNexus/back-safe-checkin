<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">护腰打卡图标</title>
  <desc id="desc">绿色渐变背景上的脊柱曲线、护腰弧线和完成勾。</desc>
  <defs>
    <linearGradient id="bg" x1="96" y1="82" x2="914" y2="938" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#064E3B"/>
      <stop offset=".48" stop-color="#059669"/>
      <stop offset="1" stop-color="#22D3A6"/>
    </linearGradient>
    <radialGradient id="glow" cx="74%" cy="20%" r="58%">
